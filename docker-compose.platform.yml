services:
  cam-snapshot-api:
    image: ${CAM_SNAPSHOT_IMAGE:-ghcr.io/easytecnologias/cam-snapshot-web:latest}
    container_name: sightops-api
    env_file:
      - .env.platform
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      ENABLE_DOCS: ${ENABLE_DOCS:-0}
      DATABASE_BACKEND: postgres
      DATABASE_HOST: sightops-postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${SIGHTOPS_DB:-sightops}
      DATABASE_USER: ${SIGHTOPS_DB_USER:-sightops}
      DATABASE_PASSWORD: ${SIGHTOPS_DB_PASSWORD:?set SIGHTOPS_DB_PASSWORD in .env.platform}
      POSTGRES_ENABLED: 1
      AUTH_DATABASE_BACKEND: postgres
      AUTH_REQUIRED: ${AUTH_REQUIRED:-1}
      AUTH_LEGACY_OPEN: ${AUTH_LEGACY_OPEN:-0}
      ENABLE_LEGACY_STATE_IMPORT: ${ENABLE_LEGACY_STATE_IMPORT:-0}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.1}
      EASY_BACKUP_PORT: ${EASY_BACKUP_PORT:-8090}
      SIGHTOPS_RELEASE_MARKER: "easy-backup-manager-20260511"
    volumes:
      - sightops_data:/app/data
      - sightops_output:/app/output
    depends_on:
      sightops-postgres:
        condition: service_healthy
      easy-backup-nginx:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/system/health/live', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sightops
    restart: unless-stopped

  sightops-nginx:
    image: nginx:1.27-alpine
    container_name: sightops-nginx
    depends_on:
      cam-snapshot-api:
        condition: service_healthy
    ports:
      - "${SIGHTOPS_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/system/health/live"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sightops
    restart: unless-stopped

  sightops-postgres:
    image: postgres:16-alpine
    container_name: sightops-postgres
    environment:
      POSTGRES_DB: ${SIGHTOPS_DB:-sightops}
      POSTGRES_USER: ${SIGHTOPS_DB_USER:-sightops}
      POSTGRES_PASSWORD: ${SIGHTOPS_DB_PASSWORD:?set SIGHTOPS_DB_PASSWORD in .env.platform}
    ports:
      - "127.0.0.1:${SIGHTOPS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - sightops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SIGHTOPS_DB_USER:-sightops} -d ${SIGHTOPS_DB:-sightops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sightops
    restart: unless-stopped

  zabbix-postgres:
    image: postgres:16-alpine
    container_name: zabbix-postgres
    environment:
      POSTGRES_DB: ${ZABBIX_DB:-zabbix}
      POSTGRES_USER: ${ZABBIX_DB_USER:-zabbix}
      POSTGRES_PASSWORD: ${ZABBIX_DB_PASSWORD:?set ZABBIX_DB_PASSWORD in .env.platform}
    volumes:
      - zabbix_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ZABBIX_DB_USER:-zabbix} -d ${ZABBIX_DB:-zabbix}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sightops
    restart: unless-stopped

  zabbix-server:
    image: ${ZABBIX_SERVER_IMAGE:-zabbix/zabbix-server-pgsql:alpine-7.0-latest}
    container_name: zabbix-server
    environment:
      DB_SERVER_HOST: zabbix-postgres
      POSTGRES_DB: ${ZABBIX_DB:-zabbix}
      POSTGRES_USER: ${ZABBIX_DB_USER:-zabbix}
      POSTGRES_PASSWORD: ${ZABBIX_DB_PASSWORD:?set ZABBIX_DB_PASSWORD in .env.platform}
      ZBX_CACHESIZE: ${ZBX_CACHESIZE:-256M}
      ZBX_HISTORYCACHESIZE: ${ZBX_HISTORYCACHESIZE:-128M}
      ZBX_TRENDCACHESIZE: ${ZBX_TRENDCACHESIZE:-128M}
      ZBX_VALUECACHESIZE: ${ZBX_VALUECACHESIZE:-128M}
    ports:
      - "${ZABBIX_SERVER_PORT:-10051}:10051"
    depends_on:
      zabbix-postgres:
        condition: service_healthy
    networks:
      - sightops
    restart: unless-stopped

  zabbix-web:
    image: ${ZABBIX_WEB_IMAGE:-zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest}
    container_name: zabbix-web
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: zabbix-postgres
      POSTGRES_DB: ${ZABBIX_DB:-zabbix}
      POSTGRES_USER: ${ZABBIX_DB_USER:-zabbix}
      POSTGRES_PASSWORD: ${ZABBIX_DB_PASSWORD:?set ZABBIX_DB_PASSWORD in .env.platform}
      PHP_TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${ZABBIX_WEB_PORT:-8081}:8080"
    depends_on:
      zabbix-server:
        condition: service_started
      zabbix-postgres:
        condition: service_healthy
    networks:
      - sightops
    restart: unless-stopped

  zabbix-agent2:
    image: ${ZABBIX_AGENT_IMAGE:-zabbix/zabbix-agent2:alpine-7.0-latest}
    container_name: zabbix-agent2
    environment:
      ZBX_HOSTNAME: ${ZABBIX_AGENT_HOSTNAME:-sightops-docker-host}
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
    depends_on:
      zabbix-server:
        condition: service_started
    networks:
      - sightops
    restart: unless-stopped

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:latest}
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env.platform}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ${GRAFANA_INSTALL_PLUGINS:-alexanderzobnin-zabbix-app}
      SIGHTOPS_DB: ${SIGHTOPS_DB:-sightops}
      SIGHTOPS_DB_USER: ${SIGHTOPS_DB_USER:-sightops}
      SIGHTOPS_DB_PASSWORD: ${SIGHTOPS_DB_PASSWORD:?set SIGHTOPS_DB_PASSWORD in .env.platform}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      zabbix-web:
        condition: service_started
    networks:
      - sightops
    restart: unless-stopped

  easy-backup-postgres:
    image: postgres:16-alpine
    container_name: easy-backup-postgres
    environment:
      POSTGRES_DB: ${EASY_BACKUP_DB:-easy_backup}
      POSTGRES_USER: ${EASY_BACKUP_DB_USER:-easy_backup}
      POSTGRES_PASSWORD: ${EASY_BACKUP_DB_PASSWORD:-easy-backup-internal-change-me}
    volumes:
      - easy_backup_postgres_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EASY_BACKUP_DB_USER:-easy_backup} -d ${EASY_BACKUP_DB:-easy_backup}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sightops
    restart: unless-stopped

  easy-urbackup-server:
    image: uroni/urbackup-server:latest
    container_name: easy-urbackup-server
    network_mode: host
    environment:
      PUID: ${URBACKUP_PUID:-1000}
      PGID: ${URBACKUP_PGID:-1000}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - easy_urbackup_backups:/backups
      - easy_urbackup_db:/var/urbackup
    restart: unless-stopped

  easy-backup-backend:
    build:
      context: ./easy-backup-manager/backend
    image: easy-backup-backend:20260511-backup-creds
    container_name: easy-backup-backend
    environment:
      NODE_ENV: production
      PORT: 4100
      DATABASE_URL: postgresql://${EASY_BACKUP_DB_USER:-easy_backup}:${EASY_BACKUP_DB_PASSWORD:-easy-backup-internal-change-me}@easy-backup-postgres:5432/${EASY_BACKUP_DB:-easy_backup}
      JWT_SECRET: ${EASY_BACKUP_JWT_SECRET:-easy-backup-jwt-change-me}
      URBACKUP_BASE_URL: ${URBACKUP_BASE_URL:-http://host.docker.internal:55414}
      URBACKUP_USERNAME: ${URBACKUP_USERNAME:-}
      URBACKUP_PASSWORD: ${URBACKUP_PASSWORD:-}
      URBACKUP_WINDOWS_CLIENT_URL: ${URBACKUP_WINDOWS_CLIENT_URL:-https://hndl.urbackup.org/Client/2.5.30/UrBackup%20Client%202.5.30.exe}
      CORS_ORIGIN: ${EASY_BACKUP_CORS_ORIGIN:-http://10.10.12.7:${EASY_BACKUP_PORT:-8090}}
      EASY_BACKUP_PUBLIC_URL: ${EASY_BACKUP_PUBLIC_URL:-http://10.10.12.7:${EASY_BACKUP_PORT:-8090}}
      URBACKUP_BACKUP_PATH: /backups
      SIGHTOPS_WINDOWS_INVENTORY_PATH: /sightops-data/windows-inventory.json
    depends_on:
      easy-backup-postgres:
        condition: service_healthy
      easy-urbackup-server:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - sightops_data:/sightops-data:ro
      - easy_urbackup_backups:/backups:ro
    networks:
      sightops:
        aliases:
          - backend
    restart: unless-stopped

  easy-backup-frontend:
    build:
      context: ./easy-backup-manager/frontend
    image: easy-backup-frontend:20260511-backup-creds
    container_name: easy-backup-frontend
    depends_on:
      - easy-backup-backend
    networks:
      sightops:
        aliases:
          - frontend
    restart: unless-stopped

  easy-backup-nginx:
    image: nginx:1.27-alpine
    container_name: easy-backup-nginx
    depends_on:
      - easy-backup-backend
      - easy-backup-frontend
    ports:
      - "${EASY_BACKUP_PORT:-8090}:80"
    volumes:
      - ./easy-backup-manager/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sightops
    restart: unless-stopped

volumes:
  sightops_data:
  sightops_output:
  sightops_postgres:
  zabbix_postgres:
  grafana_data:
  easy_backup_postgres_v2:
  easy_urbackup_backups:
  easy_urbackup_db:

networks:
  sightops:
    name: sightops-platform
