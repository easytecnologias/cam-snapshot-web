services:
  cam-snapshot-api:
    build: .
    container_name: cam-snapshot-api
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_BACKEND: ${DATABASE_BACKEND:-sqlite}
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-sightops}
      DATABASE_USER: ${DATABASE_USER:-sightops}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-sightops}
      POSTGRES_ENABLED: ${POSTGRES_ENABLED:-1}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    networks:
      - default
      - zabbix_backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/system/health/live', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: sightops-nginx
    depends_on:
      cam-snapshot-api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/system/health/live"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: sightops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sightops}
      POSTGRES_USER: ${POSTGRES_USER:-sightops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sightops}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sightops} -d ${POSTGRES_DB:-sightops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  zabbix_backend:
    external: true
